<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Router Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #status {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #555;
      transition: background 0.3s;
    }
    #status.live  { background: #34c759; }
    #status.error { background: #ff3b30; }

    #photo-wrap {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #photo {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: none;
      border-radius: 4px;
      /* 새 사진 등장 애니메이션 */
      animation: none;
    }
    #photo.appear {
      animation: fadeIn 0.25s ease-out forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.97); }
      to   { opacity: 1; transform: scale(1); }
    }

    #placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      opacity: 0.4;
      transition: opacity 0.3s;
    }
    #placeholder svg {
      width: 64px;
      height: 64px;
      fill: #fff;
    }
    #placeholder p {
      font-size: 15px;
      letter-spacing: 0.03em;
    }

    #timestamp {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    /* 새 사진 플래시 */
    @keyframes flash {
      0%   { opacity: 0; }
      20%  { opacity: 0.5; }
      100% { opacity: 0; }
    }
    #flash {
      position: fixed;
      inset: 0;
      background: #fff;
      opacity: 0;
      pointer-events: none;
    }
    #flash.active {
      animation: flash 0.35s ease-out forwards;
    }

    /* 삭제 시 페이드아웃 */
    @keyframes fadeOut {
      from { opacity: 1; }
      to   { opacity: 0; }
    }
    #photo.disappear {
      animation: fadeOut 0.4s ease-in forwards;
    }

    /* 🔮 검색어(query) 표시 - 화면 중앙 크게 */
    #query {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      font-size: clamp(40px, 16vw, 200px);
      font-weight: 800;
      letter-spacing: 0.01em;
      line-height: 1.1;
      color: #fff;
      text-shadow: 0 4px 28px rgba(0,0,0,0.85), 0 0 3px rgba(0,0,0,0.9);
      z-index: 5;
      word-break: break-word;
      pointer-events: none;
    }
    #query.appear {
      animation: fadeIn 0.25s ease-out forwards;
    }
  </style>
</head>
<body>

  <div id="status"></div>
  <div id="flash"></div>
  <div id="query"></div>

  <div id="photo-wrap">
    <img id="photo" alt="촬영된 사진" />
    <div id="placeholder">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 15.2A3.2 3.2 0 1 0 12 8.8a3.2 3.2 0 0 0 0 6.4zm0-8.4a5.2 5.2 0 1 1 0 10.4A5.2 5.2 0 0 1 12 6.8zM9 2L7.17 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-3.17L15 2H9z"/>
      </svg>
      <p>사진을 기다리는 중...</p>
    </div>
  </div>

  <div id="timestamp"></div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp }       from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBoi4cI8hVk-c7OuQWIIOnf3Pij_xi8C_0",
      authDomain: "router-8ca3a.firebaseapp.com",
      projectId: "router-8ca3a",
      storageBucket: "router-8ca3a.firebasestorage.app",
      messagingSenderId: "551647211153",
      appId: "1:551647211153:web:50041d65e673da1b3f9930"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    const photoEl      = document.getElementById('photo');
    const placeholder  = document.getElementById('placeholder');
    const statusEl     = document.getElementById('status');
    const timestampEl  = document.getElementById('timestamp');
    const flashEl      = document.getElementById('flash');
    const queryEl      = document.getElementById('query');

    // URL 파라미터 코드
    const params  = new URLSearchParams(window.location.search);
    const rawCode = params.get('code') || 'default';
    const docId   = rawCode.toLowerCase().replace(/[^a-z0-9]/g, '') || 'default';

    document.title = `Router Viewer · ${rawCode.toUpperCase()}`;
    placeholder.querySelector('p').textContent = `[${rawCode.toUpperCase()}] 사진을 기다리는 중...`;

    // API 주소(텍스트 소스). 링크의 ?api= 로 전달됨 (URLSearchParams가 자동 디코딩).
    // 복사/전송 과정에서 끼어든 공백·줄바꿈을 제거해 손상된 주소도 동작하게 함.
    const apiUrl = (params.get('api') || '').replace(/\s+/g, '') || null;

    // 두 소스 상태: 사진(Firebase) / 텍스트(API)
    let photo = { url: null, ts: 0 };
    let query = { text: null, ts: 0 };
    let shownUrl   = null;   // 현재 화면에 표시 중인 사진
    let shownQuery = null;   // 현재 화면에 표시 중인 텍스트

    const fmtTime = (date) => date.toLocaleString('ko-KR', {
      month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', second: '2-digit'
    });
    const setTimestamp = (ms) => {
      const d = ms ? new Date(ms) : new Date();
      timestampEl.textContent = `[${rawCode.toUpperCase()}] ${fmtTime(d)}`;
    };

    // 사진 숨기기 (animated=true면 페이드아웃)
    const hidePhoto = (animated) => {
      if (!shownUrl) return;
      shownUrl = null;
      if (animated) {
        photoEl.classList.remove('appear');
        photoEl.classList.add('disappear');
        setTimeout(() => {
          photoEl.style.display = 'none';
          photoEl.classList.remove('disappear');
        }, 400);
      } else {
        photoEl.classList.remove('appear', 'disappear');
        photoEl.style.display = 'none';
      }
    };

    const hideQuery = () => {
      if (!shownQuery) return;
      shownQuery = null;
      queryEl.style.display = 'none';
      queryEl.textContent = '';
    };

    // 사진만 표시 (텍스트는 숨김)
    const showPhoto = (url, ms) => {
      hideQuery();
      placeholder.style.display = 'none';
      setTimestamp(ms);
      if (url === shownUrl) { photoEl.style.display = 'block'; return; }
      shownUrl = url;
      // 플래시 효과
      flashEl.classList.remove('active');
      void flashEl.offsetWidth;
      flashEl.classList.add('active');
      photoEl.classList.remove('appear', 'disappear');
      photoEl.src = url;
      photoEl.style.display = 'block';
      requestAnimationFrame(() => photoEl.classList.add('appear'));
    };

    // 텍스트만 표시 (사진은 숨김)
    const showQueryText = (q, ms) => {
      hidePhoto(false);
      placeholder.style.display = 'none';
      setTimestamp(ms);
      if (q === shownQuery) { queryEl.style.display = 'flex'; return; }
      shownQuery = q;
      queryEl.textContent = q;
      queryEl.classList.remove('appear');
      void queryEl.offsetWidth;
      queryEl.classList.add('appear');
      queryEl.style.display = 'flex';
    };

    const showPlaceholder = () => {
      hideQuery();
      hidePhoto(true);
      placeholder.style.display = 'flex';
      timestampEl.textContent = '';
    };

    // 사진(Firebase)과 텍스트(API) 중 시각이 더 최근인 것만 표시
    const render = () => {
      const hasPhoto = !!photo.url;
      const hasQuery = !!query.text;
      let mode = null;
      if (hasPhoto && hasQuery) mode = (query.ts >= photo.ts) ? 'query' : 'photo';
      else if (hasPhoto)        mode = 'photo';
      else if (hasQuery)        mode = 'query';

      if (mode === 'query')      showQueryText(query.text, query.ts);
      else if (mode === 'photo') showPhoto(photo.url, photo.ts);
      else                       showPlaceholder();
    };

    // ① 사진: Firestore 실시간 구독
    const docRef = doc(db, 'photos', docId);
    onSnapshot(docRef,
      { includeMetadataChanges: false },
      (snapshot) => {
        statusEl.className = 'live';
        const data = snapshot.exists() ? snapshot.data() : null;
        photo = { url: data?.url || null, ts: data?.timestamp?.toMillis?.() ?? 0 };
        render();
      },
      (error) => {
        statusEl.className = 'error';
        console.error('Firestore 연결 실패:', error);
      }
    );

    // ② 텍스트: API 직접 폴링 (1초). 응답 예: { query: "맥북", ts: 1781700539149, all:[...] }
    if (apiUrl) {
      let busy = false;
      const pollApi = async () => {
        if (busy) return;
        busy = true;
        try {
          const res  = await fetch(apiUrl, { cache: 'no-store' });
          const json = await res.json();
          const ts   = Number(json?.ts) || 0;
          const text = (json?.query ?? json?.all?.[0]?.query ?? '').toString().trim();
          if (text && (text !== query.text || ts !== query.ts)) {
            query = { text, ts };
            render();
          }
        } catch (e) {
          // 일시적 네트워크 오류 무시 (다음 주기 재시도)
        } finally {
          busy = false;
        }
      };
      setInterval(pollApi, 1000);
      pollApi();
    }
  </script>

</body>
</html>
