<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Router Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #status {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #555;
      transition: background 0.3s;
    }
    #status.live  { background: #34c759; }
    #status.error { background: #ff3b30; }
    #status.live::after {
      content: "";
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 1px solid rgba(52, 199, 89, 0.45);
      animation: statusPulse 1.6s ease-out infinite;
    }

    #live-waiting {
      position: fixed;
      top: max(16px, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.36);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: rgba(255, 255, 255, 0.74);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      pointer-events: none;
      user-select: none;
    }
    #live-waiting .dots {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      width: 24px;
    }
    #live-waiting .dots span {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #34c759;
      opacity: 0;
      transform: translateY(2px) scale(0.7);
      animation: waitingDot 1.35s ease-in-out infinite;
    }
    #live-waiting .dots span:nth-child(2) { animation-delay: 0.18s; }
    #live-waiting .dots span:nth-child(3) { animation-delay: 0.36s; }

    #photo-wrap {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #photo {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: none;
      border-radius: 4px;
      /* 새 사진 등장 애니메이션 */
      animation: none;
    }
    #photo.appear {
      animation: fadeIn 0.25s ease-out forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.97); }
      to   { opacity: 1; transform: scale(1); }
    }

    #placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      opacity: 0.52;
      transition: opacity 0.3s;
    }
    #placeholder svg {
      width: 64px;
      height: 64px;
      fill: none;
      stroke: #fff;
      stroke-width: 1.7;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0.82;
      animation: idleFloat 2.4s ease-in-out infinite;
    }
    #placeholder p {
      font-size: 15px;
      letter-spacing: 0.03em;
    }
    #placeholder .idle-sub {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: rgba(255,255,255,0.58);
      letter-spacing: 0.05em;
    }
    #placeholder .idle-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #34c759;
      box-shadow: 0 0 0 0 rgba(52, 199, 89, 0.4);
      animation: dotPulse 1.4s ease-out infinite;
    }
    @keyframes idleFloat {
      0%, 100% { transform: translateY(0); opacity: 0.72; }
      50%      { transform: translateY(-4px); opacity: 0.95; }
    }
    @keyframes dotPulse {
      0%   { box-shadow: 0 0 0 0 rgba(52, 199, 89, 0.42); }
      80%  { box-shadow: 0 0 0 10px rgba(52, 199, 89, 0); }
      100% { box-shadow: 0 0 0 0 rgba(52, 199, 89, 0); }
    }
    @keyframes statusPulse {
      0%   { transform: scale(0.7); opacity: 0.9; }
      100% { transform: scale(1.8); opacity: 0; }
    }
    @keyframes waitingDot {
      0%, 70%, 100% { opacity: 0; transform: translateY(2px) scale(0.7); }
      18%, 48%      { opacity: 1; transform: translateY(0) scale(1); }
    }

    #timestamp {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    /* 새 사진 플래시 */
    @keyframes flash {
      0%   { opacity: 0; }
      20%  { opacity: 0.5; }
      100% { opacity: 0; }
    }
    #flash {
      position: fixed;
      inset: 0;
      background: #fff;
      opacity: 0;
      pointer-events: none;
    }
    #flash.active {
      animation: flash 0.35s ease-out forwards;
    }

    /* 삭제 시 페이드아웃 */
    @keyframes fadeOut {
      from { opacity: 1; }
      to   { opacity: 0; }
    }
    #photo.disappear {
      animation: fadeOut 0.4s ease-in forwards;
    }

    /* 🔮 검색어(query) 표시 - 화면 중앙 크게 */
    #query {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      font-size: clamp(40px, 16vw, 200px);
      font-weight: 800;
      letter-spacing: 0.01em;
      line-height: 1.1;
      color: #fff;
      text-shadow: 0 4px 28px rgba(0,0,0,0.85), 0 0 3px rgba(0,0,0,0.9);
      z-index: 5;
      word-break: break-word;
      pointer-events: none;
    }
    #query.appear {
      animation: fadeIn 0.25s ease-out forwards;
    }
  </style>
</head>
<body>

  <div id="status"></div>
  <div id="live-waiting">
    <span>실시간 정보 대기중</span>
    <span class="dots" aria-hidden="true"><span></span><span></span><span></span></span>
  </div>
  <div id="flash"></div>
  <div id="query"></div>

  <div id="photo-wrap">
    <img id="photo" alt="촬영된 사진" />
    <div id="placeholder">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 3.5v17" />
        <path d="M5 7.5h14" />
        <path d="M5 12h14" />
        <path d="M5 16.5h10" />
        <path d="M4 3.5h16v17H4z" />
      </svg>
      <p>정보 대기중...</p>
      <div class="idle-sub"><span class="idle-dot"></span><span>실시간 대기</span></div>
    </div>
  </div>

  <div id="timestamp"></div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp }       from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBoi4cI8hVk-c7OuQWIIOnf3Pij_xi8C_0",
      authDomain: "router-8ca3a.firebaseapp.com",
      projectId: "router-8ca3a",
      storageBucket: "router-8ca3a.firebasestorage.app",
      messagingSenderId: "551647211153",
      appId: "1:551647211153:web:50041d65e673da1b3f9930"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    const photoEl      = document.getElementById('photo');
    const placeholder  = document.getElementById('placeholder');
    const statusEl     = document.getElementById('status');
    const timestampEl  = document.getElementById('timestamp');
    const flashEl      = document.getElementById('flash');
    const queryEl      = document.getElementById('query');

    // URL 파라미터 코드
    const params  = new URLSearchParams(window.location.search);
    const rawCode = params.get('c') || params.get('code') || 'default';
    const docId   = rawCode.toLowerCase().replace(/[^a-z0-9]/g, '') || 'default';

    document.title = `Router Viewer · ${rawCode.toUpperCase()}`;
    placeholder.querySelector('p').textContent = `[${rawCode.toUpperCase()}] 정보 대기중...`;

    // API 소스. 짧은 링크는 Firestore 문서의 apiSources를 사용하고, 예전 링크의 ?source / ?api도 지원한다.
    // 복사/전송 과정에서 끼어든 공백·줄바꿈을 제거해 손상된 주소도 동작하게 함.
    const legacySources = params
      .getAll('api')
      .map((url) => ({ url, valuePath: 'query', timePath: 'ts' }));
    const configuredSources = params
      .getAll('source')
      .map((raw) => {
        try { return JSON.parse(raw); } catch (e) { return null; }
      })
      .filter(Boolean);
    const normalizeApiSources = (sources = []) => sources
      .map((source) => ({
        url: (source.url || '').replace(/\s+/g, ''),
        valuePath: (source.valuePath || '').trim(),
        timePath: (source.timePath || '').trim(),
      }))
      .filter((source) => source.url && source.valuePath);
    const urlApiSources = normalizeApiSources([...configuredSources, ...legacySources]);
    let apiSources = [...urlApiSources];
    let apiSourcesKey = JSON.stringify(apiSources);

    const updateApiSourcesFromDoc = (docSources = []) => {
      // URL에 source/api가 직접 들어온 예전 링크는 그대로 우선 지원한다.
      if (urlApiSources.length > 0) return;
      const nextSources = normalizeApiSources(Array.isArray(docSources) ? docSources : []);
      const nextKey = JSON.stringify(nextSources);
      if (nextKey === apiSourcesKey) return;
      apiSources = nextSources;
      apiSourcesKey = nextKey;
    };

    // 두 소스 상태: 사진(Firebase) / 텍스트(API)
    const STALE_CLEAR_MS = 60 * 60 * 1000; // 1시간 동안 새 데이터가 없으면 화면 비움
    let photo = { url: null, ts: 0, receivedAt: 0 };
    let query = { text: null, ts: 0, receivedAt: 0 };
    const apiState = new Map(); // API별 마지막 텍스트/시각 (시간 경로 없는 API 대응)
    const persistedApiStateKey = `router-viewer-api-state:${docId}`;
    let shownUrl   = null;   // 현재 화면에 표시 중인 사진
    let shownQuery = null;   // 현재 화면에 표시 중인 텍스트

    const fmtTime = (date) => date.toLocaleString('ko-KR', {
      month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', second: '2-digit'
    });
    const getByPath = (value, path) => {
      if (!path) return value;
      return path.split('.').reduce((current, key) => {
        if (current == null) return undefined;
        const index = Number(key);
        return current[Number.isInteger(index) && key.trim() !== '' ? index : key];
      }, value);
    };
    const toMillis = (value) => {
      if (value == null || value === '') return 0;
      if (typeof value === 'number') return value < 10000000000 ? value * 1000 : value;
      const numberValue = Number(value);
      if (!Number.isNaN(numberValue)) return numberValue < 10000000000 ? numberValue * 1000 : numberValue;
      const parsed = Date.parse(value);
      return Number.isNaN(parsed) ? 0 : parsed;
    };
    const timestampCandidatesFor = (source) => {
      const paths = [];
      if (source.timePath) paths.push(source.timePath);
      paths.push('ts', 'timestamp', 'updatedAt', 'createdAt', 'time', 'date', 'data.ts', 'data.timestamp', 'data.updatedAt');
      if (source.valuePath.includes('.')) {
        const parts = source.valuePath.split('.');
        parts.pop();
        const parent = parts.join('.');
        ['ts', 'timestamp', 'updatedAt', 'createdAt', 'time', 'date'].forEach((key) => paths.push(`${parent}.${key}`));
      }
      return [...new Set(paths.filter(Boolean))];
    };
    const inferTimestamp = (json, source) => {
      for (const path of timestampCandidatesFor(source)) {
        const ms = toMillis(getByPath(json, path));
        if (ms) return ms;
      }
      return 0;
    };
    const isFresh = (item) => {
      if (!item?.ts) return !!item?.receivedAt && Date.now() - item.receivedAt < STALE_CLEAR_MS;
      return Date.now() - item.ts < STALE_CLEAR_MS;
    };
    const readPersistedApiState = () => {
      try { return JSON.parse(localStorage.getItem(persistedApiStateKey) || '{}'); }
      catch (e) { return {}; }
    };
    const writePersistedApiState = (state) => {
      try { localStorage.setItem(persistedApiStateKey, JSON.stringify(state)); }
      catch (e) {}
    };
    const setTimestamp = (ms) => {
      const d = ms ? new Date(ms) : new Date();
      timestampEl.textContent = `[${rawCode.toUpperCase()}] ${fmtTime(d)}`;
    };

    // 사진 숨기기 (animated=true면 페이드아웃)
    const hidePhoto = (animated) => {
      if (!shownUrl) return;
      shownUrl = null;
      if (animated) {
        photoEl.classList.remove('appear');
        photoEl.classList.add('disappear');
        setTimeout(() => {
          photoEl.style.display = 'none';
          photoEl.classList.remove('disappear');
        }, 400);
      } else {
        photoEl.classList.remove('appear', 'disappear');
        photoEl.style.display = 'none';
      }
    };

    const hideQuery = () => {
      if (!shownQuery) return;
      shownQuery = null;
      queryEl.style.display = 'none';
      queryEl.textContent = '';
    };

    // 사진만 표시 (텍스트는 숨김)
    const showPhoto = (url, ms) => {
      hideQuery();
      placeholder.style.display = 'none';
      setTimestamp(ms);
      if (url === shownUrl) { photoEl.style.display = 'block'; return; }
      shownUrl = url;
      // 플래시 효과
      flashEl.classList.remove('active');
      void flashEl.offsetWidth;
      flashEl.classList.add('active');
      photoEl.classList.remove('appear', 'disappear');
      photoEl.src = url;
      photoEl.style.display = 'block';
      requestAnimationFrame(() => photoEl.classList.add('appear'));
    };

    // 텍스트만 표시 (사진은 숨김)
    const showQueryText = (q, ms) => {
      hidePhoto(false);
      placeholder.style.display = 'none';
      setTimestamp(ms);
      if (q === shownQuery) { queryEl.style.display = 'flex'; return; }
      shownQuery = q;
      queryEl.textContent = q;
      queryEl.classList.remove('appear');
      void queryEl.offsetWidth;
      queryEl.classList.add('appear');
      queryEl.style.display = 'flex';
    };

    const showPlaceholder = () => {
      hideQuery();
      hidePhoto(true);
      placeholder.style.display = 'flex';
      timestampEl.textContent = '';
    };

    // 사진(Firebase)과 텍스트(API) 중 시각이 더 최근인 것만 표시
    const render = () => {
      const hasPhoto = !!photo.url && isFresh(photo);
      const hasQuery = !!query.text && isFresh(query);
      let mode = null;
      if (hasPhoto && hasQuery) mode = (photo.ts >= query.ts - 3000) ? 'photo' : 'query';
      else if (hasPhoto)        mode = 'photo';
      else if (hasQuery)        mode = 'query';

      if (mode === 'query')      showQueryText(query.text, query.ts);
      else if (mode === 'photo') showPhoto(photo.url, photo.ts);
      else                       showPlaceholder();
    };

    // ① 사진: Firestore 실시간 구독
    const docRef = doc(db, 'photos', docId);
    onSnapshot(docRef,
      { includeMetadataChanges: false },
      (snapshot) => {
        statusEl.className = 'live';
        const data = snapshot.exists() ? snapshot.data() : null;
        updateApiSourcesFromDoc(data?.apiSources);
        const nextPhoto = {
          url: data?.url || null,
          ts: data?.timestamp?.toMillis?.() ?? 0,
        };
        const changed = nextPhoto.url !== photo.url || nextPhoto.ts !== photo.ts;
        photo = {
          ...nextPhoto,
          receivedAt: nextPhoto.url ? (changed || !photo.receivedAt ? Date.now() : photo.receivedAt) : 0,
        };
        render();
      },
      (error) => {
        statusEl.className = 'error';
        console.error('Firestore 연결 실패:', error);
      }
    );

    // ② 텍스트: API 직접 폴링 (1초). 응답 예: { query: "맥북", ts: 1781700539149, all:[...] }
    let busy = false;
    const pollApi = async () => {
      if (busy || apiSources.length === 0) return;
      busy = true;
      try {
        const results = await Promise.allSettled(
          apiSources.map(async (source) => {
            const res  = await fetch(source.url, { cache: 'no-store' });
            const json = await res.json();
            const rawText = getByPath(json, source.valuePath);
            const text = (rawText ?? '').toString().trim();
            const rawTs = inferTimestamp(json, source);
            const stateKey = source.url + '|' + source.valuePath;
            const persisted = readPersistedApiState();
            const prev = apiState.get(stateKey) || persisted[stateKey] || { text: null, ts: 0 };
            const ts = rawTs || (text && text !== prev.text ? Date.now() : prev.ts);
            if (text) {
              const nextState = { text, ts };
              apiState.set(stateKey, nextState);
              persisted[stateKey] = nextState;
              writePersistedApiState(persisted);
            }
            return { text, ts };
          })
        );
        const latest = results
          .filter((r) => r.status === 'fulfilled' && r.value.text)
          .map((r) => r.value)
          .sort((a, b) => b.ts - a.ts)[0];
        if (latest && (latest.text !== query.text || latest.ts !== query.ts)) {
          query = { ...latest, receivedAt: Date.now() };
          render();
        }
      } catch (e) {
        // 일시적 네트워크 오류 무시 (다음 주기 재시도)
      } finally {
        busy = false;
      }
    };
    setInterval(pollApi, 1000);
    pollApi();
    setInterval(render, 1000);
  </script>

</body>
</html>
